<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi Arena Shooter Prototype</title>
    <style>
        /* Modern, minimal reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #0b0c10; /* Deep dark grey/blue background */
            color: #c5c6c7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevent scrolling since game is full screen */
            cursor: crosshair; /* Pew pew! */
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Sci-Fi UI Overlay */
        #uiLayer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none; /* Let clicks pass through to canvas */
        }

        .hud-panel {
            background: rgba(11, 12, 16, 0.7);
            border: 1px solid #45a29e;
            border-radius: 8px;
            padding: 15px 25px;
            box-shadow: 0 0 15px rgba(69, 162, 158, 0.3);
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        h1 {
            color: #66fcf1;
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #c5c6c7;
            font-size: 0.9rem;
        }

        .highlight {
            color: #66fcf1;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="uiLayer">
        <div class="hud-panel">
            <h1>Neon Arena</h1>
            <p>A/D or Arrows: <span class="highlight">Move</span></p>
            <p>W or Space: <span class="highlight">Jump & Double Jump</span></p>
            <p>Mouse: <span class="highlight">Aim</span></p>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
</body>
</html>
